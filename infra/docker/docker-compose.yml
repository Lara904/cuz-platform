# infra/docker/docker-compose.yml
version: '3.9'

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: cuz-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-cuzpassword}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:7474']
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v23.3.9
    container_name: cuz-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "8080:8080"   # Redpanda Console
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'health']
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: cuz-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cuzdb}
      POSTGRES_USER: ${POSTGRES_USER:-cuzuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cuzpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cuzuser}']
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cuz-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: cuz-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      disable: true
      

  opa:
    image: openpolicyagent/opa:0.63.0
    container_name: cuz-opa
    ports:
      - "8181:8181"
    command: run --server --log-format=json-pretty
    healthcheck:
      disable: true

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  qdrant_data:

networks:
  default:
    name: cuz-network