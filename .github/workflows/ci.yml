# .github/workflows/ci.yml
name: CUz CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint & Type Check
  # ─────────────────────────────────────────────────────────────────────────
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements-dev.txt

      - run: ruff check packages/
      - run: ruff format --check packages/
      - run: mypy packages/ --exclude 'packages/.*/tests/.*'

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 — Tests unitaires
  # Chemin corrigé : packages/ (pas tests/unit/ qui n'existe pas encore)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements-dev.txt

      - run: pytest packages/ -v --tb=short --cov=packages --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3 — Tests d'intégration
  # Healthcheck Neo4j corrigé (cypher-shell sur bolt, pas wget sur HTTP)
  # ─────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      neo4j:
        image: neo4j:5.18-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: cuzdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements-dev.txt

      # tests/integration/ est vide pour l'instant — on skip gracieusement
      # À remplir à partir de P1 quand les connecteurs sont en place
      - run: |
          if [ -d "tests/integration" ] && [ -n "$(ls tests/integration/test_*.py 2>/dev/null)" ]; then
            pytest tests/integration/ -v --tb=short
          else
            echo "Aucun test d'intégration pour l'instant — skip (normal en P0)"
          fi
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_PASSWORD: testpassword
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/cuzdb_test

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4 — Build Docker Images
  # Conditionné : ne tourne que si les Dockerfiles existent (P0.8+)
  # ─────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build API image (si Dockerfile présent)
        run: |
          if [ -f "services/api/Dockerfile" ]; then
            docker build -t cuz-api:${{ github.sha }} -f services/api/Dockerfile .
          else
            echo "services/api/Dockerfile absent — skip (normal en P0)"
          fi

      - name: Build ingestion-worker image (si Dockerfile présent)
        run: |
          if [ -f "services/ingestion-worker/Dockerfile" ]; then
            docker build -t cuz-ingestion:${{ github.sha }} -f services/ingestion-worker/Dockerfile .
          else
            echo "services/ingestion-worker/Dockerfile absent — skip (normal en P0)"
          fi