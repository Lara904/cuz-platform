# tests/fixtures/acmecorp-k8s.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
  labels:
    app: frontend
    owner: team-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:          # ← manquait dans le guide
      labels:          # ← manquait dans le guide
        app: frontend  # ← doit correspondre exactement au selector ci-dessus
    spec:
      containers:
      - name: frontend
        image: nginx:1.25
        ports:
        - containerPort: 80
        
---        
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: node:18-alpine
        command: ["node", "-e", "require('http').createServer((_,r)=>r.end('ok')).listen(3000)"]
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Pod
metadata:
  name: legacy-job
  namespace: production
spec:
  containers:
  - name: legacy
    image: ubuntu:20.04
    command: ["sleep", "3600"]
    securityContext:
      privileged: true # VULNÉRABILITÉ VOLONTAIRE
      runAsUser: 0 # VULNÉRABILITÉ VOLONTAIRE